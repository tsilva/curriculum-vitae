name: Sync CV Data

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-cv-data
  cancel-in-progress: false

jobs:
  sync:
    name: Sync generated CV data
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_SYNC_TOKEN || github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Sync generated data
        run: npm --prefix web run sync

      - name: Lint web app
        run: npm --prefix web run lint

      - name: Build web app
        run: npm --prefix web run build

      - name: Open sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.GH_TOKEN }}
          branch: codex/automated-cv-sync
          delete-branch: true
          commit-message: "chore: sync generated CV data"
          title: "chore: sync generated CV data"
          body: |
            Automated daily sync of generated CV data.

            This runs:
            - `npm --prefix web run sync`
            - `npm --prefix web run lint`
            - `npm --prefix web run build`
          add-paths: |
            CV.md
            web/src/data/cv-data.json
            web/src/data/github-data.json
